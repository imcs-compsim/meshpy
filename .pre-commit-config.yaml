repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
        args: [— maxkb=1000]
      - id: check-ast
      - id: check-case-conflict
      - id: check-docstring-first
      - id: check-executables-have-shebangs
      - id: check-illegal-windows-names
      - id: check-json
      - id: check-merge-conflict
      - id: check-shebang-scripts-are-executable
      - id: check-toml
      - id: check-xml
      - id: check-yaml
      - id: end-of-file-fixer
      - id: debug-statements
      - id: no-commit-to-branch # prevent commiting to main/master
      - id: trailing-whitespace
  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.0
    hooks:
      - id: bandit
        args: ["-c", "pyproject.toml", "-r", "-ll", "meshpy/"]
        additional_dependencies: ["bandit[toml]"]
  - repo: https://github.com/PyCQA/docformatter
    rev: "eb1df347edd128b30cd3368dddc3aa65edcfac38"
    hooks:
      - id: docformatter
        args: ["--in-place", "--config=./pyproject.toml", "-r", "meshpy/"]
  - repo: https://github.com/econchick/interrogate
    rev: 1.7.0
    hooks:
      - id: interrogate
        args: [--fail-under=95, --ignore-init-module, --style=google, -vv, meshpy/]
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        args: ["--install-types", "--non-interactive", "--ignore-missing-imports", "--follow-imports=silent"]
  - repo: https://github.com/asmeurer/removestar
    rev: "1.5.2"
    hooks:
      - id: removestar
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Ruff version.
    rev: v0.8.2
    hooks:
      # Run the linter.
      - id: ruff
        args: ["--fix", "--select", "I"]
      # Run the formatter.
      - id: ruff-format
  - repo: https://github.com/pamoller/xmlformatter
    rev: v0.2.8
    hooks:
      - id: xml-formatter
        args: [--indent, "2", --indent-char, " ", --selfclose, --overwrite, --eof-newline]
  - repo: https://github.com/google/yamlfmt
    rev: v0.14.0
    hooks:
      - id: yamlfmt
